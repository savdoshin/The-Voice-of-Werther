<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голос Вертеры • Сократ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">🧿</div>
                <h1>Голос Вертеры</h1>
                <p>Сократ • Groq</p>
            </div>
        </header>

        <div id="chat" class="chat"></div>

        <div class="input-area">
            <textarea id="userInput" rows="3" placeholder="Опиши ситуацию или вызов в бизнесе Вертеры..."></textarea>
            <div class="controls">
                <button id="sendBtn" class="send-btn">Задать вопрос Сократу →</button>
                <div class="status" id="status"></div>
            </div>
        </div>
    </div>

    <script>
        // === Groq API ===
        const GROQ_API_KEY = "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"; // ← ВСТАВЬ СВОЙ КЛЮЧ

        const SYSTEM_PROMPT = `Ты — Сократ...`; // ← вставь полный промпт из файла

        let conversation = [{ role: "system", content: SYSTEM_PROMPT }];

        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Приветствие
        window.onload = () => {
            addMessage(`Приветствую тебя, мой друг.<br><br>
Я — Сократ, который снова бродит по земле, только теперь в невидимой тоге и с лёгкой улыбкой над самим собой.<br><br>
Скажи, какую ситуацию или вызов в бизнесе «Вертера» ты хочешь разобрать сегодня?<br>
Я готов слушать и задавать вопросы, которые помогут тебе увидеть то, что сейчас скрыто.`, 'socrates');
        };

        sendBtn.addEventListener('click', async () => {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            conversation.push({ role: "user", content: message });
            userInput.value = '';
            statusEl.textContent = 'Сократ думает...';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: conversation,
                        temperature: 0.75,
                        max_tokens: 1200
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const reply = data.choices[0].message.content;
                addMessage(reply, 'socrates');
                conversation.push({ role: "assistant", content: reply });
            } catch (err) {
                console.error(err);
                addMessage(`<strong>Ошибка:</strong> ${err.message}`, 'socrates');
            }
            statusEl.textContent = '';
        });

        // Отправка по Enter
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
