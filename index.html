    let GROQ_API_KEY = localStorage.getItem('GROQ_API_KEY') || '';

    // Если ключа нет — просим ввести
    if (!GROQ_API_KEY) {
        GROQ_API_KEY = prompt("Введите ваш Groq API Key (gsk_...):");
        if (GROQ_API_KEY) {
            localStorage.setItem('GROQ_API_KEY', GROQ_API_KEY);
        } else {
            alert("Без API-ключа приложение не сможет работать.");
